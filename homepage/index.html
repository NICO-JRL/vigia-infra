document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-bottom:1px solid var(--line)\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:19px 40px;display:flex;justify-content:space-between;align-items:center\">\n      <div style=\"display:flex;align-items:center;gap:14px;cursor:pointer\" onclick=\"{{ goInicio }}\">\n        <div style=\"width:40px;height:40px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12.5px;font-weight:700;color:#fff\">IICA<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:11px\">\n          <span style=\"font-family:var(--sans);font-size:22px;font-weight:600;letter-spacing:-.02em\">Vigía<\u002Fspan>\n          <span style=\"width:1px;height:16px;background:var(--line)\"><\u002Fspan>\n          <span style=\"font-family:var(--sans);font-size:13px;color:var(--ink2)\">Observatorio de Disponibilidad Aparente<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:26px\">\n        <span style=\"{{ navInicio }}\" onclick=\"{{ goInicio }}\">Inicio<\u002Fspan>\n        <span style=\"{{ navHerramientas }}\" onclick=\"{{ goHerramientas }}\">Herramientas<\u002Fspan>\n        <span style=\"{{ navMetodologia }}\" onclick=\"{{ goMetodologia }}\">Metodología<\u002Fspan>\n        <span style=\"{{ navFuentes }}\" onclick=\"{{ goFuentes }}\">Fuentes<\u002Fspan>\n        <span style=\"font-family:var(--sans);font-size:13px;font-weight:600;color:var(--gold);background:var(--surface);border:1.5px solid var(--gold);padding:9px 19px;border-radius:999px;cursor:pointer\" style-hover=\"background:var(--gold);color:#fff\">Ingresar<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"min-height:560px\">\n\n    <!-- ===== INICIO ===== -->\n    <sc-if value=\"{{ isInicio }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Vista Inicio\" style=\"background:var(--surface);position:relative;overflow:hidden\">\n      <div style=\"max-width:1160px;margin:0 auto;padding:72px 40px 64px;position:relative\">\n        <div aria-hidden=\"true\" style=\"position:absolute;top:30px;left:34px;font-family:var(--sans);font-size:154px;font-weight:700;letter-spacing:-.04em;color:#E9EEF3;line-height:.8;pointer-events:none;z-index:0\">Vigía<\u002Fdiv>\n        <div style=\"position:relative;z-index:1;display:grid;grid-template-columns:1fr 372px;gap:56px;align-items:center\">\n          <div>\n            <div style=\"font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--brand)\">Observatorio · República de Panamá<\u002Fdiv>\n            <h1 style=\"font-family:var(--sans);font-size:44px;font-weight:600;letter-spacing:-.025em;line-height:1.1;margin:16px 0 0;max-width:620px\">Seguimiento a la disponibilidad de granos básicos en Panamá<\u002Fh1>\n            <p style=\"font-family:var(--sans);font-size:18px;line-height:1.6;color:var(--ink2);max-width:540px;margin:20px 0 30px\">Vigía es el observatorio del IICA en Panamá dedicado al seguimiento de la disponibilidad de los granos básicos. Reúne proyecciones mensuales y alertas tempranas para apoyar las decisiones de política, producción y comercio del país.<\u002Fp>\n            <span onclick=\"{{ goHerramientas }}\" style=\"display:inline-flex;align-items:center;gap:10px;font-family:var(--sans);font-size:15px;font-weight:600;color:#fff;background:var(--brand);padding:14px 26px;border-radius:999px;cursor:pointer\" style-hover=\"background:#003862\">Explorar herramientas <span style=\"font-family:var(--mono)\">→<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:var(--ink);border-radius:18px;padding:26px 26px 20px;border-bottom:4px solid var(--gold);box-shadow:0 26px 55px -28px rgba(21,33,44,.65)\">\n            <div style=\"font-family:var(--sans);font-size:20px;font-weight:600;color:#fff;letter-spacing:-.01em\">Accesos directos<\u002Fdiv>\n            <div style=\"font-family:var(--sans);font-size:13.5px;line-height:1.55;color:rgba(255,255,255,.6);margin-top:6px\">Encuentra rápido lo que ofrece el observatorio.<\u002Fdiv>\n            <div style=\"margin-top:16px\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid rgba(255,255,255,.13);cursor:pointer\" onclick=\"{{ goHerramientas }}\" style-hover=\"padding-left:4px\"><span style=\"font-family:var(--mono);font-weight:700;font-size:16px;color:var(--goldOn)\">›<\u002Fspan><span style=\"font-family:var(--sans);font-size:14.5px;color:rgba(255,255,255,.9)\">Explorar herramientas<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid rgba(255,255,255,.13);cursor:pointer\" onclick=\"{{ goMetodologia }}\" style-hover=\"padding-left:4px\"><span style=\"font-family:var(--mono);font-weight:700;font-size:16px;color:var(--goldOn)\">›<\u002Fspan><span style=\"font-family:var(--sans);font-size:14.5px;color:rgba(255,255,255,.9)\">Metodología<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid rgba(255,255,255,.13);cursor:pointer\" onclick=\"{{ goFuentes }}\" style-hover=\"padding-left:4px\"><span style=\"font-family:var(--mono);font-weight:700;font-size:16px;color:var(--goldOn)\">›<\u002Fspan><span style=\"font-family:var(--sans);font-size:14.5px;color:rgba(255,255,255,.9)\">Fuentes de datos<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid rgba(255,255,255,.13)\"><span style=\"font-family:var(--mono);font-weight:700;font-size:16px;color:var(--goldOn)\">›<\u002Fspan><span style=\"font-family:var(--sans);font-size:14.5px;color:rgba(255,255,255,.9)\">Directorio · IICA Panamá<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:44px;margin-top:58px;padding-top:36px;border-top:1px solid var(--line)\">\n          <div>\n            <div style=\"font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--brand);margin-bottom:9px\">Actualización mensual<\u002Fdiv>\n            <p style=\"font-family:var(--sans);font-size:14px;line-height:1.6;color:var(--ink2);margin:0\">Cada herramienta se pone al día mes a mes con la información más reciente del sector.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--brand);margin-bottom:9px\">Alertas por semáforo<\u002Fdiv>\n            <p style=\"font-family:var(--sans);font-size:14px;line-height:1.6;color:var(--ink2);margin:0\">Una lectura común —verde, amarillo, rojo— sobre el riesgo de desabastecimiento.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--brand);margin-bottom:9px\">Un grano, una herramienta<\u002Fdiv>\n            <p style=\"font-family:var(--sans);font-size:14px;line-height:1.6;color:var(--ink2);margin:0\">La colección crece grano a grano, con el mismo enfoque y la misma metodología.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== HERRAMIENTAS ===== -->\n    <sc-if value=\"{{ isHerramientas }}\">\n    <div data-screen-label=\"Vista Herramientas\" style=\"background:var(--surface)\">\n      <div style=\"max-width:1160px;margin:0 auto;padding:56px 40px 60px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px\">\n          <div>\n            <div style=\"font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px\">Herramientas del observatorio<\u002Fdiv>\n            <h2 style=\"font-family:var(--sans);font-size:26px;font-weight:600;margin:0;letter-spacing:-.015em\">Explore la colección<\u002Fh2>\n          <\u002Fdiv>\n          <span style=\"font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink3);padding-bottom:4px\">1 herramienta activa<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:32px 34px;box-shadow:0 1px 2px rgba(21,33,44,.04)\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap\">\n            <div>\n              <div style=\"display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--brand);margin-bottom:10px\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--brand)\"><\u002Fspan>Herramienta activa<\u002Fdiv>\n              <div style=\"font-family:var(--sans);font-size:26px;font-weight:600;letter-spacing:-.015em\">Vigía Arroz<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);font-size:14px;font-weight:600;color:#fff;background:var(--brand);padding:13px 22px;border-radius:999px;white-space:nowrap;cursor:pointer\" style-hover=\"background:#003862\">Abrir Vigía Arroz <span style=\"font-family:var(--mono)\">→<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:16px;line-height:1.6;color:var(--ink2);max-width:680px;margin:18px 0 0\">Vigía Arroz da seguimiento a la disponibilidad de arroz en Panamá. Proyecta, mes a mes, cuánto arroz habrá disponible frente al consumo esperado del país, y señala con un semáforo los meses en riesgo de déficit.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:26px;padding-top:24px;border-top:1px solid var(--line)\">\n            <div>\n              <div style=\"font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--brand);margin-bottom:8px\">Proyección mensual<\u002Fdiv>\n              <p style=\"font-family:var(--sans);font-size:13.5px;line-height:1.55;color:var(--ink2);margin:0\">Disponibilidad aparente de arroz (qq LS), calculada para cada mes del período.<\u002Fp>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--brand);margin-bottom:8px\">Alertas por semáforo<\u002Fdiv>\n              <p style=\"font-family:var(--sans);font-size:13.5px;line-height:1.55;color:var(--ink2);margin:0\">Cada mes se marca en verde, amarillo o rojo según la cobertura del consumo.<\u002Fp>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--brand);margin-bottom:8px\">Balance de disponibilidad<\u002Fdiv>\n              <p style=\"font-family:var(--sans);font-size:13.5px;line-height:1.55;color:var(--ink2);margin:0\">Inventario inicial + producción + importaciones − consumo estimado.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== METODOLOGÍA ===== -->\n    <sc-if value=\"{{ isMetodologia }}\">\n    <div data-screen-label=\"Vista Metodología\" style=\"background:var(--surface);position:relative;overflow:hidden\">\n      <div style=\"max-width:1160px;margin:0 auto;padding:84px 40px;position:relative\">\n        <div aria-hidden=\"true\" style=\"position:absolute;top:44px;left:34px;font-family:var(--sans);font-size:150px;font-weight:700;letter-spacing:-.02em;color:#EEF1F4;line-height:.8;pointer-events:none;z-index:0\">MÉTODO<\u002Fdiv>\n        <div style=\"position:relative;z-index:1;max-width:680px\">\n          <div style=\"font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--brand)\">Metodología<\u002Fdiv>\n          <h2 style=\"font-family:var(--sans);font-size:32px;font-weight:600;margin:12px 0 0;letter-spacing:-.02em\">Cómo se construye Vigía<\u002Fh2>\n          <div style=\"width:52px;height:2px;background:var(--gold);margin:20px 0\"><\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:16px;line-height:1.7;color:var(--ink2);margin:0 0 24px\">Cada herramienta estima la disponibilidad aparente a partir de la producción, los inventarios, el comercio y el consumo, y la resume con una alerta por semáforo. La documentación detallada por grano se publicará en esta sección.<\u002Fp>\n          <span style=\"display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--ink3);background:var(--surface2);border:1px solid var(--line);padding:7px 13px;border-radius:999px\">En preparación<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== FUENTES ===== -->\n    <sc-if value=\"{{ isFuentes }}\">\n    <div data-screen-label=\"Vista Fuentes\" style=\"background:var(--surface);position:relative;overflow:hidden\">\n      <div style=\"max-width:1160px;margin:0 auto;padding:84px 40px;position:relative\">\n        <div aria-hidden=\"true\" style=\"position:absolute;top:44px;left:34px;font-family:var(--sans);font-size:150px;font-weight:700;letter-spacing:-.02em;color:#EEF1F4;line-height:.8;pointer-events:none;z-index:0\">FUENTES<\u002Fdiv>\n        <div style=\"position:relative;z-index:1;max-width:680px\">\n          <div style=\"font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--brand)\">Fuentes<\u002Fdiv>\n          <h2 style=\"font-family:var(--sans);font-size:32px;font-weight:600;margin:12px 0 0;letter-spacing:-.02em\">De dónde vienen los datos<\u002Fh2>\n          <div style=\"width:52px;height:2px;background:var(--gold);margin:20px 0\"><\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:16px;line-height:1.7;color:var(--ink2);margin:0 0 24px\">Vigía integra información oficial del IICA y de las instituciones del sector agropecuario de Panamá. El detalle de fuentes y su periodicidad, por herramienta, se publicará en esta sección.<\u002Fp>\n          <span style=\"display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--ink3);background:var(--surface2);border:1px solid var(--line);padding:7px 13px;border-radius:999px\">En preparación<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- footer -->\n  <div style=\"background:var(--ink);color:rgba(255,255,255,.7)\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:48px 40px 30px\">\n      <div style=\"display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr;gap:40px\">\n        <div>\n          <div style=\"font-family:var(--sans);font-size:22px;font-weight:600;letter-spacing:-.02em;color:#fff\">Vigía<\u002Fdiv>\n          <div style=\"width:34px;height:3px;background:var(--gold);margin:14px 0 0\"><\u002Fdiv>\n          <p style=\"font-family:var(--sans);font-size:13.5px;line-height:1.6;color:rgba(255,255,255,.6);max-width:340px;margin:16px 0 0\">Observatorio de disponibilidad aparente de granos básicos. Una iniciativa del Instituto Interamericano de Cooperación para la Agricultura (IICA), Representación en Panamá.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:#fff\">Herramientas<\u002Fdiv>\n          <div style=\"width:26px;height:2px;background:var(--gold);margin:8px 0 15px\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-family:var(--sans);font-size:13.5px;color:rgba(255,255,255,.72)\"><span style=\"cursor:pointer\" onclick=\"{{ goHerramientas }}\" style-hover=\"color:#fff\">Vigía Arroz<\u002Fspan><span>Vigía Maíz<\u002Fspan><span>Vigía Frijol<\u002Fspan><span>Precios de referencia<\u002Fspan><span>Comercio exterior<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:#fff\">Recursos<\u002Fdiv>\n          <div style=\"width:26px;height:2px;background:var(--gold);margin:8px 0 15px\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-family:var(--sans);font-size:13.5px;color:rgba(255,255,255,.72)\"><span style=\"cursor:pointer\" onclick=\"{{ goMetodologia }}\" style-hover=\"color:#fff\">Metodología<\u002Fspan><span style=\"cursor:pointer\" onclick=\"{{ goFuentes }}\" style-hover=\"color:#fff\">Fuentes de datos<\u002Fspan><span>Glosario de términos<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:#fff\">Institucional<\u002Fdiv>\n          <div style=\"width:26px;height:2px;background:var(--gold);margin:8px 0 15px\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-family:var(--sans);font-size:13.5px;color:rgba(255,255,255,.72)\"><span style=\"cursor:pointer\" style-hover=\"color:#fff\">IICA Panamá<\u002Fspan><span>Contacto<\u002Fspan><span>Aviso legal<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid rgba(255,255,255,.14);margin-top:36px;padding-top:20px;font-family:var(--mono);font-size:11px;letter-spacing:.02em;color:rgba(255,255,255,.5)\">© 2026 IICA · Instituto Interamericano de Cooperación para la Agricultura · Boletín v3.0<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#0B1219;padding:12px 0\">\n      <div style=\"max-width:1160px;margin:0 auto;padding:0 40px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:rgba(255,255,255,.5)\">vigia.iica.int · IICA Panamá<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { tab: 'inicio' };\n  go(tab){ this.setState({ tab }); }\n  renderVals(){\n    const tab = this.state.tab;\n    const base = { fontFamily:'var(--sans)', fontSize:'14px', cursor:'pointer', paddingBottom:'4px', borderBottom:'2px solid transparent' };\n    const active = Object.assign({}, base, { fontWeight:600, color:'var(--brand)', borderBottom:'2px solid var(--brand)' });\n    const idle = Object.assign({}, base, { fontWeight:400, color:'var(--ink2)' });\n    const st = (t) => (tab === t ? active : idle);\n    return {\n      isInicio: tab === 'inicio',\n      isHerramientas: tab === 'herramientas',\n      isMetodologia: tab === 'metodologia',\n      isFuentes: tab === 'fuentes',\n      navInicio: st('inicio'),\n      navHerramientas: st('herramientas'),\n      navMetodologia: st('metodologia'),\n      navFuentes: st('fuentes'),\n      goInicio: () => this.go('inicio'),\n      goHerramientas: () => this.go('herramientas'),\n      goMetodologia: () => this.go('metodologia'),\n      goFuentes: () => this.go('fuentes'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
